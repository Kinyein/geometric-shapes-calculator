<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Calculadora áreas, perímetros y volúmenes de figuras geométricas
    </title>
    <link rel="stylesheet" href="styles.css" />
    <script src="main.js" defer></script>
  </head>
  <body>
    <div class="wrap">
      <h1>Calculadora geométrica</h1>
      <p class="subtitle">Figuras planas y sólidos regulares</p>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('flat', this)">
          Figuras planas
        </button>
        <button class="tab" onclick="switchTab('solids', this)">
          Sólidos regulares
        </button>
      </div>

      <div class="card">
        <form id="section-flat">
          <div class="field">
            <label>Figura</label>
            <select id="sel-flat" onchange="renderFlat()">
              <option value="cuadrado">Cuadrado</option>
              <option value="rectangulo">Rectángulo</option>
              <option value="triangulo">Triángulo</option>
              <option value="circulo">Círculo</option>
            </select>
          </div>
          <div id="icon-flat" class="icon-shape"></div>
          <div id="inputs-flat" class="inputs-grid"></div>
          <button class="calc-btn">Calcular</button>
          <div id="res-flat"></div>
          <p id="hint-flat" class="formula-hint"></p>
        </form>

        <form id="section-solids" style="display: none">
          <div class="field">
            <label>Sólido</label>
            <select id="sel-solid" onchange="renderSolid()">
              <option value="cubo">Cubo</option>
              <option value="prisma">Prisma rectangular</option>
              <option value="cilindro">Cilindro</option>
              <option value="piramide">Pirámide</option>
              <option value="cono">Cono</option>
              <option value="esfera">Esfera</option>
            </select>
          </div>
          <div id="icon-solid" class="icon-shape"></div>
          <div id="inputs-solid" class="inputs-grid"></div>
          <button class="calc-btn">Calcular</button>
          <div id="res-solid"></div>
          <p id="hint-solid" class="formula-hint"></p>
        </form>
      </div>
    </div>
  </body>
</html>

<script></script>
